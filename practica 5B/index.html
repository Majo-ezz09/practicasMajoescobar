<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Información Personal</title>
</head>
<body>

    <h1>Información Sobre Mí</h1>

    <form>

        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre">
        <br><br>

        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad">
        <br><br>

        <label for="fechaNacimiento">Fecha de nacimiento:</label>
        <input type="date" id="fechaNacimiento" name="fechaNacimiento">
        <br><br>

        <label for="colorFavorito">Color favorito:</label>
        <input type="color" id="colorFavorito" name="colorFavorito">
        <br><br>

        <label for="comidaFavorita">Comida favorita:</label>
        <input type="text" id="comidaFavorita" name="comidaFavorita">
        <br><br>

        <label for="hobbieFavorito">Hobbie favorito:</label>
        <input type="text" id="hobbieFavorito" name="hobbieFavorito">
        <br><br>

        <label>¿Tiene mascotas?</label>
        <br>

        <input type="radio" id="siMascotas" name="mascotas" value="si">
        <label for="siMascotas">Sí</label>

        <input type="radio" id="noMascotas" name="mascotas" value="no">
        <label for="noMascotas">No</label>

        <br><br>

        <input type="reset" value="Reiniciar">
        <input type="submit" value="Enviar">

    </form>

</body>
</html>
